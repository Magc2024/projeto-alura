<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Objetivos do Ano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="conteudo-principal">
        <h2 class="titulo-principal">Meus Objetivos do Ano<span>_</span></h2>
        
        <!-- Tabs -->
        <div class="tabs" id="tabs"></div>

        <!-- Card Principal -->
        <div class="objetivo-card" id="objetivo-card">
            <div id="texto-objetivo-ativo" class="texto-objetivo">Estudar 4 cursos na Alura</div>
            
            <div class="countdown-section">
                <div class="countdown-titulo">TEMPO PARA COMPLETAR OBJETIVO</div>
                <div class="countdown-timer" id="countdown-timer">
                    <div class="time-box">
                        <span class="number" id="days">00</span>
                        <span class="label">dias</span>
                    </div>
                    <div class="time-box">
                        <span class="number" id="hours">00</span>
                        <span class="label">horas</span>
                    </div>
                    <div class="time-box">
                        <span class="number" id="minutes">00</span>
                        <span class="label">min</span>
                    </div>
                    <div class="time-box">
                        <span class="number" id="seconds">00</span>
                        <span class="label">seg</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="botao-adicionar" id="btn-adicionar">
            + Adicionar Novo Objetivo
        </button>
    </section>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-conteudo">
            <h3 id="modal-titulo">Novo Objetivo</h3>
            <input type="text" id="input-objetivo" placeholder="Digite o objetivo..." maxlength="80">
            <div class="modal-botoes">
                <button class="botao-cancelar" id="btn-cancelar">Cancelar</button>
                <button class="botao-salvar" id="btn-salvar">Salvar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
